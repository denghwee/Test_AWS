<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPT Support Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Auth Overlay -->
    <div id="authOverlay" class="auth-overlay">
      <form class="auth-panel" id="authForm">
        <div class="logo-icon auth-logo">AI</div>
        <h2 id="authTitle">Sign in to FPT Assistant</h2>
        <p class="auth-subtitle" id="authSubtitle">Use your account to load your real chat sessions.</p>

        <label class="auth-field">
          <span>Email</span>
          <input id="authEmail" type="email" autocomplete="email" required>
        </label>

        <label class="auth-field hidden" id="nameField">
          <span>Full name</span>
          <input id="authName" type="text" autocomplete="name">
        </label>

        <label class="auth-field">
          <span>Password</span>
          <input id="authPassword" type="password" autocomplete="current-password" minlength="6" required>
        </label>

        <p id="authStatusText" class="auth-status" role="status"></p>

        <button class="auth-submit" id="authSubmitBtn" type="submit">Sign in</button>
        <button class="auth-switch" id="authModeBtn" type="button">Create an account</button>
      </form>
    </div>

    <div id="app" class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo-container">
            <div class="logo-icon">AI</div>
            <span class="logo-text">FPT Assistant</span>
          </div>
          <button class="mobile-close-btn" id="closeSidebarBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          New Chat
        </button>

        <div class="chat-history">
          <div class="history-empty" id="historyEmpty">No sessions yet.</div>
          <div id="historyGroups"></div>
        </div>

        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-info">
              <span class="user-name" id="userName">Signed out</span>
              <span class="user-role" id="userEmail">Please sign in</span>
            </div>
            <button class="settings-btn" id="logoutBtn" title="Sign out">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Mobile Header -->
        <header class="mobile-header">
          <button class="menu-btn" id="openSidebarBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <div class="mobile-title">FPT Assistant</div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
          <!-- Welcome Screen -->
          <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#F26F21" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <h1 class="welcome-title">How can I help you today?</h1>
            
            <div class="suggested-prompts">
              <button class="prompt-card">
                <div class="prompt-icon green">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <div class="prompt-text">Create a support ticket for WiFi issues</div>
              </button>
              <button class="prompt-card">
                <div class="prompt-icon blue">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <div class="prompt-text">Book meeting room A for tomorrow at 9 AM</div>
              </button>
              <button class="prompt-card">
                <div class="prompt-icon orange">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </div>
                <div class="prompt-text">What is the company policy on remote work?</div>
              </button>
            </div>
          </div>

          <!-- Conversation Container -->
          <div class="conversation-container hidden" id="conversationContainer">
            <!-- Dynamic chat bubbles will go here -->
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-container">
            <button class="input-action-btn" title="Attach file">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <textarea id="chatInput" placeholder="Message FPT Assistant..." rows="1"></textarea>
            <button class="input-action-btn" title="Voice input">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
          <div class="input-helper">
            AI can make mistakes. Please verify important information.
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
