name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$EC2_HOST" || { echo "Missing EC2_HOST repository secret"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "Missing EC2_SSH_KEY repository secret"; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ec2-user
          DEPLOY_DIR: /home/ec2-user/fastapi-final
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem "$EC2_USER@$EC2_HOST" \
            "DEPLOY_DIR='$DEPLOY_DIR' \
             REPOSITORY='$REPOSITORY' \
             BRANCH='$BRANCH' \
             AWS_ACCESS_KEY_ID='$AWS_ACCESS_KEY_ID' \
             AWS_SECRET_ACCESS_KEY='$AWS_SECRET_ACCESS_KEY' \
             DATABASE_URL='$DATABASE_URL' \
             S3_BUCKET_NAME='$S3_BUCKET_NAME' \
             SECRET_KEY='$SECRET_KEY' \
             OPENAI_API_KEY='$OPENAI_API_KEY' \
             TAVILY_API_KEY='$TAVILY_API_KEY' \
             bash -s" <<'EOF'
          set -euo pipefail

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            rm -rf "$DEPLOY_DIR"
            git clone --branch "$BRANCH" "https://github.com/$REPOSITORY.git" "$DEPLOY_DIR"
          fi

          cd "$DEPLOY_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull origin "$BRANCH"

          cat > fpt_customer_chatbot_api/.env <<ENVEOF
          PROJECT_NAME="FPT Customer Chatbot API"
          VERSION="1.0.0"
          API_V1_STR="/api/v1"
          SECRET_KEY="${SECRET_KEY:-change-me-in-production}"
          ALGORITHM="HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES=60

          DATABASE_URL="${DATABASE_URL}"
          DATABASE_SSLMODE="verify-full"
          DATABASE_SSLROOTCERT="./global-bundle.pem"

          AWS_REGION="ap-southeast-1"
          S3_BUCKET_NAME="${S3_BUCKET_NAME}"
          AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}"
          AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}"

          ENABLE_AI_CHAT=false
          OPENAI_API_KEY="${OPENAI_API_KEY:-}"
          TAVILY_API_KEY="${TAVILY_API_KEY:-}"
          ENVEOF

          chmod 600 fpt_customer_chatbot_api/.env

          docker compose --env-file fpt_customer_chatbot_api/.env \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            build

          docker compose --env-file fpt_customer_chatbot_api/.env \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            up -d

          docker ps --filter "name=fastapi-customer-chatbot-api"
          curl --fail http://localhost:8000/
          EOF
