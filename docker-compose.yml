services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-customer-chatbot:latest
    container_name: fastapi-customer-chatbot-api
    env_file:
      - ./fpt_customer_chatbot_api/.env
    environment:
      DATABASE_URL: sqlite:////app/fpt_chatbot.db
      ENABLE_AI_CHAT: "false"
    ports:
      - "8000:8000"
    restart: unless-stopped
